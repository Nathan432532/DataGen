# =============================================================
# Data Engineering Lab — Airflow + PostgreSQL
# =============================================================
# Usage:  docker compose up --build
# UI:     http://localhost:8080  (admin / admin)
# =============================================================

x-airflow-common: &airflow-common
  build: .
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bank}"
    AIRFLOW__DATABASE__SQL_ALCHEMY_SCHEMA: airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    PYTHONPATH: /opt/airflow
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB:-bank}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    KAGGLE_API_TOKEN: ${KAGGLE_API_TOKEN}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - airflow-logs:/opt/airflow/logs
  networks:
    - data-net
  restart: unless-stopped

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bank}
      PGDATA: /data/postgres
    volumes:
      - postgres-data:/data/postgres
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5332:5432"
    networks:
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-bank} -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Airflow — one-shot init (migrate DB + create admin) ──
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@example.com || true
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Airflow Webserver ─────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ─────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: airflow scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    networks:
      - data-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── pgAdmin ───────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    networks:
      - data-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  data-net:
    driver: bridge

volumes:
  postgres-data:
  airflow-logs:
